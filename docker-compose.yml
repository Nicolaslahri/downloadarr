services:
  api:
    build:
      context: ./backend
    container_name: musicdl-api
    environment:
      LIBRARY_PATH: /library
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend/.data:/app/.data           # SQLite + settings.json + tools/
      - ${LIBRARY_PATH:-./library}:/library  # final tagged audio library
      - ./downloads:/downloads               # in-flight workspace
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
    container_name: musicdl-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
